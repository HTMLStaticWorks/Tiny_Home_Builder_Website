<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | TinyDream</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css?v=10">
    <style>
        .error-num {
            font-size: 15rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }
    </style>
</head>

<body class="bg-light min-vh-100 d-flex align-items-center">
    <!-- Floating Desktop Toggles -->
    <div class="position-fixed top-0 end-0 p-4 z-3 d-flex gap-2">
        <button class="rtl-toggle shadow-sm" aria-label="Toggle RTL Mode">RTL</button>
        <button class="theme-toggle shadow-sm" aria-label="Toggle Dark Mode">
            <i class="bi bi-moon-stars"></i>
        </button>
    </div>

    <div class="container text-center py-5">
        <span class="error-num">404</span>
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <i class="bi bi-house-x text-primary display-1 mb-4"></i>
                <h1 class="display-3 fw-bold mb-3">Lost in Transit?</h1>
                <p class="lead text-secondary mb-5">The tiny home (or page) you're looking for doesn't exist. It might
                    have been relocated to a scenic mountain range or simply never built.</p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="index.html" class="btn btn-primary px-5 py-3 fw-bold">Return to Home</a>
                    <a href="contact.html" class="btn btn-outline-secondary px-5 py-3 fw-bold">Contact Support</a>
                </div>

                <div class="mt-5 pt-5">
                    <p class="text-secondary small fw-bold mb-4 uppercase tracking-widest">HELPFUL LINKS</p>
                    <div class="d-flex justify-content-center flex-wrap gap-4">

                        <a href="portfolio.html" class="text-primary text-decoration-none small fw-bold">PORTFOLIO</a>
                        <a href="packages.html" class="text-primary text-decoration-none small fw-bold">PRICING</a>
                        <a href="about.html" class="text-primary text-decoration-none small fw-bold">OUR STORY</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/main.js"></script>
</body>

</html>
