<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TinyDream | Access Your Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css?v=10">
    <style>
        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            overflow-y: auto;
        }


        @media (max-height: 700px) {
            .custom-card {
                padding: 1.5rem !important;
            }

            .navbar-brand {
                margin-bottom: 1rem !important;
            }

            .form-control {
                padding-top: 0.5rem !important;
                padding-bottom: 0.5rem !important;
            }

            .mb-4,
            .mb-5 {
                margin-bottom: 1rem !important;
            }
        }
    </style>
</head>

<body>

    <!-- Floating Theme Toggle -->
    <div class="position-fixed top-0 end-0 p-4 z-3">
        <button class="theme-toggle shadow-sm" aria-label="Toggle Dark Mode">
            <i class="bi bi-moon-stars"></i>
        </button>
    </div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="custom-card mx-auto border-0 shadow-lg text-center">
                    <a href="index.html" class="navbar-brand mb-4 justify-content-center w-100">
                        <i class="bi bi-house-heart"></i>
                        <span>TinyDream</span>
                    </a>

                    <h3 class="fw-bold mb-1">Welcome Back</h3>
                    <p class="text-secondary small mb-4">Access your dashboard to track your build.</p>

                    <form action="dashboard-user.html" method="GET" class="text-start needs-validation" novalidate>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Email Address</label>
                            <input type="email" class="form-control bg-light border-0 py-2"
                                placeholder="john@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Password</label>
                            <div class="position-relative">
                                <input type="password" class="form-control bg-light border-0 py-2"
                                    placeholder="••••••••" required>
                            </div>
                        </div>
                        <div class="mb-3 d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label small text-secondary" for="rememberMe">Remember me</label>
                            </div>
                            <a href="#" class="small text-primary text-decoration-none">Forgotten Password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3">Login</button>
                    </form>

                    <div class="d-flex align-items-center mb-3">
                        <hr class="flex-grow-1 border-secondary opacity-25">
                        <span class="mx-3 text-muted" style="font-size: 10px;">OR LOGIN WITH</span>
                        <hr class="flex-grow-1 border-secondary opacity-25">
                    </div>

                    <div class="d-flex gap-2 mb-4">
                        <button class="btn btn-outline-secondary w-100 py-2 small"><i class="bi bi-google me-2"></i>
                            Google</button>
                        <button class="btn btn-outline-secondary w-100 py-2 small"><i class="bi bi-facebook me-2"></i>
                            Facebook</button>
                    </div>

                    <p class="text-muted small mb-0">No account? <a href="register.html"
                            class="text-primary fw-bold text-decoration-none border-bottom border-primary">Create
                            one</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/main.js"></script>
</body>

</html>
