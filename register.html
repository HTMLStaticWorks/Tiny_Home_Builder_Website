<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TinyDream | Start Your Journey</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css?v=10">
    <style>
        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            overflow-y: auto;
        }

        /* Consistently Inherits from style.css */

        .social-icon-btn {
            width: 48px;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            border-radius: 50%;
            padding: 0;
            flex-shrink: 0;
        }

        @media (max-height: 800px) {
            .custom-card {
                padding: 1.5rem !important;
            }

            .navbar-brand {
                margin-bottom: 1rem !important;
            }

            .form-control,
            .form-select {
                padding-top: 0.5rem !important;
                padding-bottom: 0.5rem !important;
            }

            .mb-5,
            .my-5 {
                margin-bottom: 0.75rem !important;
                margin-top: 0.75rem !important;
            }
        }
    </style>
</head>

<body>



    <div class="container py-3">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="custom-card mx-auto border-0 shadow-lg text-center position-relative">
                    <!-- Integrated Theme Toggle (Consistent on all screens) -->
                    <div class="d-flex justify-content-end gap-2 mb-3">
                        <button class="rtl-toggle shadow-sm btn-sm" aria-label="Toggle RTL Mode">RTL</button>
                        <button class="theme-toggle shadow-sm btn-sm" aria-label="Toggle Dark Mode">
                            <i class="bi bi-moon-stars"></i>
                        </button>
                    </div>

                    <a href="index.html" class="navbar-brand mb-4 justify-content-center w-100">
                        <i class="bi bi-house-heart"></i>
                        <span>TinyDream</span>
                    </a>

                    <h3 class="fw-bold mb-1">Begin Your Build</h3>
                    <p class="text-secondary small mb-4">Create an account to start your journey.</p>

                    <!-- Form Section -->
                    <form action="dashboard-user.html" method="GET" class="text-start needs-validation" novalidate>
                        <div class="row g-1">
                            <div class="col-12 mb-3">
                                <label class="form-label fw-bold small">First Name</label>
                                <input type="text" class="form-control bg-light border-0 py-2"
                                    placeholder="Enter your first name" required>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label fw-bold small">Last Name</label>
                                <input type="text" class="form-control bg-light border-0 py-2"
                                    placeholder="Enter your last name" required>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label fw-bold small">Email Address</label>
                                <input type="email" class="form-control bg-light border-0 py-2"
                                    placeholder="Enter your mail address" required>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label fw-bold small">Password</label>
                                <div class="position-relative">
                                    <input type="password" id="regPassword" class="form-control bg-light border-0 py-2 pe-5"
                                        placeholder="••••••••" required>
                                    <button type="button" class="btn position-absolute end-0 top-50 translate-middle-y border-0 pe-3 py-0" onclick="togglePassword('regPassword', this)">
                                        <i class="bi bi-eye text-muted"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label fw-bold small">Confirm Password</label>
                                <div class="position-relative">
                                    <input type="password" id="confirmPassword" class="form-control bg-light border-0 py-2 pe-5"
                                        placeholder="••••••••" required>
                                    <button type="button" class="btn position-absolute end-0 top-50 translate-middle-y border-0 pe-3 py-0" onclick="togglePassword('confirmPassword', this)">
                                        <i class="bi bi-eye text-muted"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label fw-bold small">Plan Type</label>
                                <select class="form-select bg-light border-0 py-2" required>
                                    <option value="" selected disabled>Select package...</option>
                                    <option value="shell">The Shell ($35k+)</option>
                                    <option value="turnkey">The Turnkey ($75k+)</option>
                                    <option value="luxury">The Luxury ($110k+)</option>
                                </select>
                            </div>
                            <div class="col-12 form-check mb-4">
                                <input type="checkbox" class="form-check-input" id="termsCheck" required>
                                <label class="form-check-label small text-secondary" style="font-size: 11px;"
                                    for="termsCheck">I agree to the <a href="#" class="text-primary">Policy</a> & <a
                                        href="#" class="text-primary">Terms</a>.</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mb-4">Create
                            Account</button>
                    </form>

                    <div class="d-flex align-items-center mb-4">
                        <hr class="flex-grow-1 border-secondary opacity-25">
                        <span class="mx-3 text-muted text-uppercase tracking-widest" style="font-size: 10px;">OR CONTINUE WITH</span>
                        <hr class="flex-grow-1 border-secondary opacity-25">
                    </div>

                    <!-- Social Icons Section -->
                    <div class="d-flex justify-content-center gap-3 mb-4">
                        <button class="btn btn-outline-secondary social-icon-btn" aria-label="Sign up with Google"><i
                                class="bi bi-google"></i></button>
                        <button class="btn btn-outline-secondary social-icon-btn" aria-label="Sign up with Facebook"><i
                                class="bi bi-facebook"></i></button>
                        <button class="btn btn-outline-secondary social-icon-btn" aria-label="Sign up with Apple"><i
                                class="bi bi-apple"></i></button>
                    </div>

                    <div class="pt-3 border-top border-secondary border-opacity-10">
                        <p class="text-muted mb-0" style="font-size: 12px;">Already have an account? <a
                                href="login.html"
                                class="text-primary fw-bold text-decoration-none border-bottom border-primary">Login</a>
                        </p>
                    </div>

                    <script>
                        function togglePassword(inputId, btn) {
                            const input = document.getElementById(inputId);
                            const icon = btn.querySelector('i');
                            if (input.type === 'password') {
                                input.type = 'text';
                                icon.classList.replace('bi-eye', 'bi-eye-slash');
                            } else {
                                input.type = 'password';
                                icon.classList.replace('bi-eye-slash', 'bi-eye');
                            }
                        }
                    </script>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/main.js"></script>
</body>

</html>
