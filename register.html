<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TinyDream | Start Your Journey</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css?v=10">
    <style>
        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            overflow-y: auto;
        }

        /* Consistently Inherits from style.css */

        @media (max-height: 800px) {
            .custom-card {
                padding: 1.5rem !important;
            }

            .navbar-brand {
                margin-bottom: 1rem !important;
            }

            .form-control,
            .form-select {
                padding-top: 0.5rem !important;
                padding-bottom: 0.5rem !important;
            }

            .mb-5,
            .my-5 {
                margin-bottom: 0.75rem !important;
                margin-top: 0.75rem !important;
            }
        }
    </style>
</head>

<body>
    <!-- Floating Desktop Theme Toggle -->
    <div class="position-fixed top-0 end-0 p-4 z-3 d-none d-lg-flex gap-2">
        <button class="rtl-toggle shadow-sm" aria-label="Toggle RTL Mode">RTL</button>
        <button class="theme-toggle shadow-sm" aria-label="Toggle Dark Mode">
            <i class="bi bi-moon-stars"></i>
        </button>
    </div>



    <div class="container py-3">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="custom-card mx-auto border-0 shadow-lg text-center position-relative">
                    <!-- Mobile Integrated Theme Toggle -->
                    <div class="position-absolute top-0 end-0 p-3 d-lg-none d-flex gap-2">
                        <button class="rtl-toggle shadow-sm" aria-label="Toggle RTL Mode">RTL</button>
                        <button class="theme-toggle shadow-sm" aria-label="Toggle Dark Mode">
                            <i class="bi bi-moon-stars"></i>
                        </button>
                    </div>


                    <a href="index.html" class="navbar-brand mb-4 justify-content-center w-100">
                        <i class="bi bi-house-heart"></i>
                        <span>TinyDream</span>
                    </a>

                    <h3 class="fw-bold mb-1">Begin Your Build</h3>
                    <p class="text-secondary small mb-4">Create an account to start your journey.</p>

                    <form action="dashboard-user.html" method="GET" class="text-start needs-validation" novalidate>
                        <div class="row g-1">
                            <div class="col-12 mb-3">
                                <label class="form-label fw-bold small">First Name</label>
                                <input type="text" class="form-control bg-light border-0 py-2" placeholder="Jane"
                                    required>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label fw-bold small">Last Name</label>
                                <input type="text" class="form-control bg-light border-0 py-2" placeholder="Doe"
                                    required>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label fw-bold small">Email Address</label>
                                <input type="email" class="form-control bg-light border-0 py-2"
                                    placeholder="jane@example.com" required>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label fw-bold small">Password</label>
                                <input type="password" class="form-control bg-light border-0 py-2"
                                    placeholder="••••••••" required>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label fw-bold small">Confirm Password</label>
                                <input type="password" class="form-control bg-light border-0 py-2"
                                    placeholder="••••••••" required>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label fw-bold small">Plan Type</label>
                                <select class="form-select bg-light border-0 py-2" required>
                                    <option value="" selected disabled>Select package...</option>
                                    <option value="shell">The Shell ($35k+)</option>
                                    <option value="turnkey">The Turnkey ($75k+)</option>
                                    <option value="luxury">The Luxury ($110k+)</option>
                                </select>
                            </div>
                            <div class="col-12 form-check mb-4">
                                <input type="checkbox" class="form-check-input" id="termsCheck" required>
                                <label class="form-check-label small text-secondary" style="font-size: 11px;"
                                    for="termsCheck">I agree to the <a href="#" class="text-primary">Policy</a> & <a
                                        href="#" class="text-primary">Terms</a>.</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3 mt-1">Create Account</button>
                    </form>

                    <div class="d-flex align-items-center mb-3">
                        <hr class="flex-grow-1 border-secondary opacity-25">
                        <span class="mx-3 text-muted" style="font-size: 10px;">Or Continue With</span>
                        <hr class="flex-grow-1 border-secondary opacity-25">
                    </div>

                    <div class="d-flex gap-2 mb-4">
                        <button class="btn btn-outline-secondary w-100 py-2 small"><i class="bi bi-google me-2"></i>
                            Google</button>
                        <button class="btn btn-outline-secondary w-100 py-2 small"><i class="bi bi-facebook me-2"></i>
                            Facebook</button>
                    </div>

                    <p class="text-muted" style="font-size: 12px; margin-bottom: 0;">Already have an account? <a
                            href="login.html"
                            class="text-primary fw-bold text-decoration-none border-bottom border-primary">Login
                            here</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/main.js"></script>
</body>

</html>
